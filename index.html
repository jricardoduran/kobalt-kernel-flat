<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kobalt Red FLAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./visual/kobalt.css">
</head>
<body>
<script>
(function(){var t=localStorage.getItem('kobalt:theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();
</script>

<!-- ═══ FONDO DECORATIVO ═══ -->
<div class="bg-wrap">
  <div class="spark" style="top:12%;left:8%;animation-delay:0s"></div>
  <div class="spark" style="top:24%;left:78%;animation-delay:1.2s"></div>
  <div class="spark" style="top:68%;left:22%;animation-delay:2.4s"></div>
  <div class="spark" style="top:82%;left:88%;animation-delay:.8s"></div>
  <div class="spark" style="top:45%;left:52%;animation-delay:1.8s"></div>
</div>

<!-- ═══ NAVBAR ═══ -->
<nav class="nav">
  <span class="nav-logo">KOBALT</span>
  <div class="nav-right">
    <span id="sync-badge" class="badge badge-warn" style="display:none">—</span>
    <button id="btn-sync" class="btn" style="display:none">↻ Sync</button>
    <button id="btn-accounts" class="btn" style="display:none">
      Cuentas<span id="acc-badge" class="acc-badge" style="display:none">0</span>
    </button>
    <button id="btn-logout" class="btn" style="display:none">Salir</button>
    <button id="btnTheme" class="btn-theme">
      <span id="thIconD">☾</span><span id="thIconL" style="display:none">☀</span>
      <span id="thLabel">Oscuro</span>
    </button>
  </div>
</nav>

<!-- ═══ PANTALLA LOGIN ═══ -->
<div id="screen-login" class="page">
  <div class="login-wrap">
    <div class="login-card">
      <!-- Tabs -->
      <div class="tab-switcher">
        <button class="tab-btn active" data-tab="login">Ingresar</button>
        <button class="tab-btn" data-tab="register">Registrar</button>
      </div>

      <div class="tab-body">
        <!-- Panel Login -->
        <div id="panelLogin" class="tab-panel active">
          <div class="form-stack">
            <div class="field">
              <label>Código país + Teléfono</label>
              <div class="country-phone-row">
                <div id="loginCountryPicker"></div>
                <input class="k-input" type="tel" id="loginPhone"
                       placeholder="3001234567" autocomplete="tel">
              </div>
            </div>
            <div class="field">
              <label>Contraseña</label>
              <input class="k-input" type="password" id="loginPass" autocomplete="current-password">
            </div>
            <button id="btnLogin" class="btn-primary">Ingresar</button>
            <p class="tab-hint">¿No tienes cuenta? <button class="link-btn" data-switch-tab="register">Regístrate</button></p>
          </div>
        </div>

        <!-- Panel Register -->
        <div id="panelRegister" class="tab-panel">
          <div class="form-stack">
            <div class="field">
              <label>Nombre completo</label>
              <input class="k-input" type="text" id="regName" placeholder="Tu nombre" autocomplete="name">
            </div>
            <div class="field">
              <label>Código país + Teléfono</label>
              <div class="country-phone-row">
                <div id="regCountryPicker"></div>
                <input class="k-input" type="tel" id="regPhone"
                       placeholder="3001234567" autocomplete="tel">
              </div>
              <span class="hint">Código de marcado del país + dígitos del teléfono.</span>
            </div>
            <div class="field">
              <label>Contraseña</label>
              <input class="k-input" type="password" id="regPass">
            </div>
            <button id="btnRegister" class="btn-primary">Registrar</button>
            <p class="tab-hint">¿Ya tienes cuenta? <button class="link-btn" data-switch-tab="login">Ingresa</button></p>
          </div>
        </div>
      </div>

      <!-- Status -->
      <div id="statusOut"></div>
    </div>
  </div>
</div>

<!-- ═══ PANTALLA APP ═══ -->
<div id="screen-app">
  <div class="app-bar">
    <span id="ki-session" style="font-family:var(--font-mono);font-size:.7rem;color:var(--text-muted)">—</span>
    <span style="flex:1"></span>
    <button id="btn-toggle-add" class="btn">+ Producto</button>
    <button id="btn-export" class="btn">⬇ JSON</button>
  </div>

  <div id="add-bar">
    <input type="text" id="add-name" placeholder="Nombre del producto" style="flex:1;min-width:150px">
    <input type="text" id="add-sku" placeholder="SKU" style="width:100px">
    <input type="number" id="add-stk" value="0" style="width:60px" min="0">
    <button id="btn-add-product" class="btn-add">AGREGAR</button>
    <button id="btn-close-add" class="btn" style="padding:6px 8px">✕</button>
  </div>

  <div id="app-tabs">
    <button class="app-tab on" data-tab="inventario">Inventario</button>
    <button class="app-tab" data-tab="pos">Vender</button>
    <button class="app-tab" data-tab="historial">Historial</button>
  </div>

  <div id="tab-inventario" class="tab-page on">

  <div class="controls-bar">
    <div class="search-wrap">
      <span class="search-ico">⌕</span>
      <input class="search-input" id="search-input" type="search" placeholder="Buscar nombre o SKU…" autocomplete="off">
    </div>
    <span style="flex:1"></span>
    <select id="sort-select" class="sort-select">
      <option value="ts-desc">Recientes</option>
      <option value="ts-asc">Antiguos</option>
      <option value="name-az">Nombre A→Z</option>
      <option value="name-za">Nombre Z→A</option>
      <option value="stk-desc">Mayor stock</option>
    </select>
    <div class="view-toggle">
      <button id="btn-view-list" class="btn" title="Vista lista">☰</button>
      <button id="btn-view-grid" class="btn" title="Vista grilla">⊞</button>
    </div>
  </div>

  <div class="filters">
    <button class="fbtn on" data-f="all">TODOS</button>
    <button class="fbtn" data-f="nosku">SIN SKU</button>
    <button class="fbtn" data-f="nostock">SIN STOCK</button>
    <button class="fbtn" data-f="low">STOCK≤3</button>
  </div>

  <div class="chips">
    <span class="chip" id="chip-total">— productos</span>
    <span class="chip chip-nostock" id="chip-nostock" style="display:none"></span>
    <span class="chip chip-low" id="chip-low" style="display:none"></span>
    <span class="chip chip-nosku" id="chip-nosku" style="display:none"></span>
  </div>

  <div id="grid"></div>
  <div id="empty">Sin productos aún.<br>Usa + Producto para comenzar.</div>

  <div class="ki-grid">
    <div class="ki-row"><span class="ki-label">Node</span><span class="ki-val" id="ki-node">—</span></div>
    <div class="ki-row"><span class="ki-label">DB</span><span class="ki-val" id="ki-db">—</span></div>
    <div class="ki-row"><span class="ki-label">Entidades</span><span class="ki-val" id="ki-count">—</span></div>
    <div class="ki-row"><span class="ki-label">Status</span><span class="ki-val" id="ki-status">—</span></div>
    <div class="ki-row"><span class="ki-label">Kernel</span><span class="ki-val" id="ki-version">—</span></div>
  </div>

  </div><!-- /tab-inventario -->

  <div id="tab-pos" class="tab-page" style="display:none">
  </div><!-- /tab-pos -->

  <div id="tab-historial" class="tab-page" style="display:none">
  </div><!-- /tab-historial -->

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Overlay -->
<div id="drawer-overlay" class="drawer-overlay"></div>

<!-- Drawer de cuentas -->
<div id="accounts-drawer" class="accounts-drawer">
  <div class="drawer-head">
    <div>
      <div class="drawer-title">Cuentas en este dispositivo</div>
      <div class="drawer-sub">Selecciona para pre-rellenar</div>
    </div>
    <button id="drawer-close-btn" class="btn-close">
      <svg viewBox="0 0 12 12" fill="none">
        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body">
    <div id="drawer-account-list"></div>
  </div>
  <div class="drawer-foot">
    <button id="drawer-clear-btn" class="btn-clear-all">
      Limpiar cuentas guardadas
    </button>
  </div>
</div>

<!-- ═══ SCRIPTS ═══ -->
<script src="./core/kernel_flat.js"></script>
<script src="./red/connectors.js"></script>
<script src="./visual/kobalt.visual.js"></script>
<script src="./apps/commerce.js"></script>
</body>
</html>
