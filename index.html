<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kobalt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./visual/kobalt.css">
<link rel="stylesheet" href="./dashboard/dashboard.css">
<script>(function(){
  var t=localStorage.getItem('kobalt:theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
})();</script>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="screen-login" class="page">
  <div class="login-wrap">
    <div class="login-card">
      <!-- Tabs -->
      <div class="tab-switcher">
        <button class="tab-btn active" data-tab="login">Ingresar</button>
        <button class="tab-btn" data-tab="register">Registrar</button>
      </div>

      <div class="tab-body">
        <!-- Panel Login -->
        <div id="panelLogin" class="tab-panel active">
          <div class="form-stack">
            <div class="field">
              <label>Código país + Teléfono</label>
              <div class="country-phone-row">
                <div id="loginCountryPicker"></div>
                <input class="k-input" type="tel" id="loginPhone"
                       placeholder="3001234567" autocomplete="tel">
              </div>
            </div>
            <div class="field">
              <label>Contraseña</label>
              <input class="k-input" type="password" id="loginPass" autocomplete="current-password">
            </div>
            <button id="btnLogin" class="btn-primary">Ingresar</button>
            <p class="tab-hint">¿No tienes cuenta? <button class="link-btn" data-switch-tab="register">Regístrate</button></p>
          </div>
        </div>

        <!-- Panel Register -->
        <div id="panelRegister" class="tab-panel">
          <div class="form-stack">
            <div class="field">
              <label>Nombre completo</label>
              <input class="k-input" type="text" id="regName" placeholder="Tu nombre" autocomplete="name">
            </div>
            <div class="field">
              <label>Código país + Teléfono</label>
              <div class="country-phone-row">
                <div id="regCountryPicker"></div>
                <input class="k-input" type="tel" id="regPhone"
                       placeholder="3001234567" autocomplete="tel">
              </div>
              <span class="hint">Código de marcado del país + dígitos del teléfono.</span>
            </div>
            <div class="field">
              <label>Contraseña</label>
              <input class="k-input" type="password" id="regPass">
            </div>
            <button id="btnRegister" class="btn-primary">Registrar</button>
            <p class="tab-hint">¿Ya tienes cuenta? <button class="link-btn" data-switch-tab="login">Ingresa</button></p>
          </div>
        </div>
      </div>

      <!-- Status -->
      <div id="statusOut"></div>
    </div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dashboard">

  <!-- Topbar -->
  <div id="db-topbar">
    <button id="db-mobile-menu"
            style="display:none;background:none;border:none;
                   color:var(--text-muted);font-size:1.1rem;
                   cursor:pointer;padding:4px;margin-right:4px">
      ☰
    </button>
    <div id="db-logo">
      <img id="db-logo-icon" src="./logo.png" alt="Kobalt" width="24" height="24">
      <span id="db-logo-text">KOBALT</span>
    </div>
    <div id="db-breadcrumb"
         style="color:var(--text-muted);font-size:.78rem">
      Cargando…
    </div>
    <div id="db-topbar-right">
      <div id="db-stats-bar"></div>
      <span id="sync-badge"
            class="badge badge-warn"
            style="display:none">—</span>
      <button id="db-sync-btn" class="btn"
              style="display:none;font-size:.7rem">
        ↻ Sync
      </button>
      <button id="btn-accounts" class="btn"
              style="display:none;font-size:.7rem">
        Cuentas
        <span id="acc-badge" class="acc-badge"
              style="display:none">0</span>
      </button>
      <button id="btnTheme" class="btn-theme">
        <span id="thIconD">☾</span>
        <span id="thIconL" style="display:none">☀</span>
      </button>
    </div>
  </div>

  <!-- Cuerpo -->
  <div id="db-body">

    <!-- Sidebar -->
    <div id="db-sidebar">
      <div id="db-collapse-btn">
        <button id="db-collapse-btn-el">
          <span id="db-toggle-icon">←</span>
        </button>
      </div>
      <nav id="db-nav"></nav>
      <div id="db-sidebar-foot">
        <button class="db-nav-item" id="db-logout-foot"
                data-tooltip="Salir">
          <span class="db-nav-icon">🚪</span>
          <span class="db-nav-label">Salir</span>
        </button>
      </div>
    </div>

    <!-- Contenido de apps -->
    <div id="db-content"></div>

  </div>
</div>

<!-- Toast global -->
<div id="toast"></div>

<!-- Overlay -->
<div id="drawer-overlay" class="drawer-overlay"></div>

<!-- Drawer de cuentas -->
<div id="accounts-drawer" class="accounts-drawer">
  <div class="drawer-head">
    <div>
      <div class="drawer-title">Cuentas en este dispositivo</div>
      <div class="drawer-sub">Selecciona para pre-rellenar</div>
    </div>
    <button id="drawer-close-btn" class="btn-close">
      <svg viewBox="0 0 12 12" fill="none">
        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body">
    <div id="drawer-account-list"></div>
  </div>
  <div class="drawer-foot">
    <button id="drawer-clear-btn" class="btn-clear-all">
      Limpiar cuentas guardadas
    </button>
  </div>
</div>

<!-- ═══ SCRIPTS ═══ -->
<script src="./core/kernel_flat.js"></script>
<script src="./red/connectors.js"></script>
<script src="./visual/kobalt.visual.js"></script>
<script src="./dashboard/dashboard.js"></script>
<script src="./apps/commerce/commerce.js"></script>
</body>
</html>
